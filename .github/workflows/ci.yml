name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:

  Build:
    name: Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up release build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            dosfstools \
            mtools \
            qemu-system-x86 \
            qemu-system-arm \
            qemu-system-aarch64 \
            qemu-efi-aarch64 \
            qemu-utils \
            xorriso \
            make \
            lld \
            llvm

      - name: Build x86_64 ISO
        run: |
          set -euxo pipefail
          make -f Makefile.multiarch ARCH=x86_64 image

      - name: Build x86_64 Installer ISO
        run: |
          set -euxo pipefail
          make -f Makefile.multiarch ARCH=x86_64 installer-image

      - name: Build x86_64 DOS Installer ISO
        run: |
          set -euxo pipefail
          make -f Makefile.multiarch ARCH=x86_64 dos-installer-iso

      - name: Build ARM64 ISO
        run: |
          set -euxo pipefail
          make -f Makefile.multiarch ARCH=arm64 image

      - name: Verify release files
        run: |
          set -euxo pipefail
          ls -lh image/os8-x86_64.iso
          file image/os8-x86_64.iso
          ls -lh image/os-x86_64-installer.iso
          file image/os-x86_64-installer.iso
          ls -lh image/os-x86_64-dos-installer.iso
          file image/os-x86_64-dos-installer.iso
          ls -lh image/os-arm64.iso
          file image/os-arm64.iso

      - name: Generate release notes
        run: |
          cat > release_notes.md << EOF
          # os-next-stage CI Draft

          Automatic draft release generated from CI.

          ## Build Status

          - ARM64 ISO: success
          - x86_64 ISO: success
          - x86_64 Installer ISO: success
          - x86_64 DOS Installer ISO: success

          ## Bootable Media

          - \`os8-x86_64.iso\`
          - \`os-x86_64-installer.iso\`
          - \`os-x86_64-dos-installer.iso\`
          - \`os-arm64.iso\`

          ## Branch
          - \`${{ github.ref_name }}\`

          ## Commit
          - \`${{ github.sha }}\`
          EOF

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-draft
          target_commitish: ${{ github.sha }}
          name: os-next-stage CI Draft
          body_path: release_notes.md
          draft: true
          prerelease: true
          files: |
            image/os8-x86_64.iso
            image/os-x86_64-installer.iso
            image/os-x86_64-dos-installer.iso
            image/os-arm64.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

