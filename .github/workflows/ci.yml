name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test-arm64:
    name: Build and Diagnose ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up ARM64 build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-system-arm \
            qemu-system-aarch64 \
            qemu-efi-aarch64 \
            qemu-utils \
            xorriso \
            parted \
            gdisk \
            dosfstools \
            mtools \
            util-linux \
            e2fsprogs \
            make \
            lld \
            llvm

      - name: Show tool availability
        run: |
          set -eux
          command -v make
          command -v qemu-img || true
          command -v qemu-system-aarch64 || true
          command -v parted || true
          command -v sgdisk || true
          command -v mkfs.vfat || true
          command -v mcopy || true
          command -v losetup || true
          command -v mount || true
          command -v umount || true
          command -v truncate || true
          command -v dd || true
          command -v clang || true
          command -v ld.lld || true

      - name: Print Makefile image section
        run: |
          echo "===== Makefile.multiarch around image target ====="
          nl -ba Makefile.multiarch | sed -n '240,320p'

      - name: Build ARM64 kernel
        run: |
          set -euxo pipefail
          make -f Makefile.multiarch ARCH=arm64 kernel

      - name: Check ARM64 kernel artifact
        run: |
          set -euxo pipefail
          ls -lh build/arm64/kernel/vibos-arm64.elf
          file build/arm64/kernel/vibos-arm64.elf
          ls -lh build/arm64/kernel/sections.txt || true

      - name: Build ARM64 image with tracing
        id: arm64_image
        run: |
          set -euxo pipefail
          make --trace -f Makefile.multiarch ARCH=arm64 image

      - name: Check ARM64 image artifact
        if: success()
        run: |
          set -euxo pipefail
          ls -lh image/unixos.img
          file image/unixos.img

      - name: ARM64 failure diagnostics
        if: failure()
        run: |
          set +e
          echo "===== workspace ====="
          pwd
          ls -lah
          echo "===== build dir ====="
          find build -maxdepth 4 -type f | sort || true
          echo "===== image dir ====="
          find image -maxdepth 3 -type f | sort || true
          echo "===== loop devices ====="
          sudo losetup -a || true
          echo "===== mounts ====="
          mount || true
          echo "===== disk usage ====="
          df -h || true
          echo "===== image file status ====="
          ls -lh image/unixos.img || true
          file image/unixos.img || true
          echo "===== Makefile image section again ====="
          nl -ba Makefile.multiarch | sed -n '240,320p'

      - name: Upload ARM64 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-diagnostics
          path: |
            build/arm64/kernel/vibos-arm64.elf
            build/arm64/kernel/sections.txt
            image/unixos.img
          if-no-files-found: ignore

  build-x86_64:
    name: Build x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up x86_64 build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            qemu-system-x86 \
            qemu-utils \
            xorriso \
            parted \
            gdisk \
            dosfstools \
            mtools \
            util-linux \
            e2fsprogs \
            make \
            lld \
            llvm

      - name: Build x86_64 BIOS+UEFI ISO
        run: |
          set -euxo pipefail
          make -f Makefile.multiarch ARCH=x86_64 image

      - name: Check x86_64 build artifacts
        run: |
          set -euxo pipefail
          ls -lh build/x86_64/kernel/vibos-x86_64.elf
          file build/x86_64/kernel/vibos-x86_64.elf
          ls -lh image/vibos-x86_64.iso
          file image/vibos-x86_64.iso

      - name: Upload x86_64 artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vibos-x86_64-iso
          path: image/vibos-x86_64.iso

  summary:
    name: Build Summary
    needs: [build-and-test-arm64, build-x86_64]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Write summary
        run: |
          {
            echo "## Build Summary"
            echo
            echo "| Architecture | Output | Status |"
            echo "|--------------|--------|--------|"
            echo "| ARM64 | \`unixos.img\` | ${{ needs.build-and-test-arm64.result }} |"
            echo "| x86_64 | \`vibos-x86_64.iso\` | ${{ needs.build-x86_64.result }} |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.build-and-test-arm64.result }}" = "success" ] && [ "${{ needs.build-x86_64.result }}" = "success" ]; then
            echo "All builds passed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          else
            echo "At least one build failed. Check the ARM64 trace output and Makefile lines around 281." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  draft-release:
    name: Draft Release
    needs: [build-and-test-arm64, build-x86_64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.build-and-test-arm64.result == 'success' && needs.build-x86_64.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up release build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-system-x86 \
            qemu-system-arm \
            qemu-system-aarch64 \
            qemu-efi-aarch64 \
            qemu-utils \
            xorriso \
            parted \
            gdisk \
            dosfstools \
            mtools \
            util-linux \
            e2fsprogs \
            make \
            lld \
            llvm

      - name: Build x86_64 ISO
        run: |
          set -euxo pipefail
          make -f Makefile.multiarch ARCH=x86_64 image

      - name: Build ARM64 image
        run: |
          set -euxo pipefail
          make -f Makefile.multiarch ARCH=arm64 image

      - name: Verify release files
        run: |
          set -euxo pipefail
          ls -lh image/vibos-x86_64.iso
          file image/vibos-x86_64.iso
          ls -lh image/unixos.img
          file image/unixos.img

      - name: Generate release notes
        run: |
          cat > release_notes.md << EOF
          # os-next-stage CI Draft

          Automatic draft release generated from CI.

          ## Build Status

          - ARM64 build and image: success
          - x86_64 build and ISO: success

          ## Bootable Media

          - \`vibos-x86_64.iso\` - bootable x86_64 BIOS+UEFI ISO
          - \`unixos.img\` - bootable ARM64 disk image

          ## Branch

          - \`${{ github.ref_name }}\`

          ## Commit

          - \`${{ github.sha }}\`
          EOF

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-draft
          target_commitish: ${{ github.sha }}
          name: os-next-stage CI Draft
          body_path: release_notes.md
          draft: true
          prerelease: true
          files: |
            image/vibos-x86_64.iso
            image/unixos.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
