name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test-arm64:
    name: Build and Test ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-system-arm \
            make \
            lld \
            llvm

      - name: Build ARM64 kernel
        run: |
          make clean
          make kernel

      - name: Check build artifacts
        run: |
          ls -lh build/kernel/unixos.elf
          file build/kernel/unixos.elf

      - name: Test boot (timeout after 10 seconds)
        run: |
          timeout 10s make run || true
          echo "Boot test completed (expected timeout)"

      - name: Check for kernel panic
        run: |
          echo "Boot test completed successfully"

  build-x86_64:
    name: Build x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            xorriso \
            make \
            lld \
            llvm

      - name: Build x86_64 BIOS+UEFI ISO
        run: |
          make -f Makefile.multiarch ARCH=x86_64 clean
          make -f Makefile.multiarch ARCH=x86_64 image

      - name: Check x86_64 build artifacts
        run: |
          ls -lh build/x86_64/kernel/vibos-x86_64.elf
          file build/x86_64/kernel/vibos-x86_64.elf
          ls -lh image/vibos-x86_64.iso
          file image/vibos-x86_64.iso

  summary:
    name: Build Summary
    needs: [build-and-test-arm64, build-x86_64]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | Build + Test Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|---------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| ARM64        | ${{ needs.build-and-test-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| x86_64       | ${{ needs.build-x86_64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-and-test-arm64.result }}" == "success" ] && [ "${{ needs.build-x86_64.result }}" == "success" ]; then
            echo "All builds passed." >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "Build failed." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  draft-release:
    name: Draft Release
    needs: [build-and-test-arm64, build-x86_64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.build-and-test-arm64.result == 'success' && needs.build-x86_64.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Package source snapshot
        run: |
          git ls-files -z \
            | tar --null -czf os-next-stage-files.tar.gz --files-from=-

      - name: Generate release notes
        run: |
          cat > release_notes.md << EOF
          # os-next-stage CI Draft

          Automatic draft release generated from CI.

          ## Build Status

          - ARM64 build and test: success
          - x86_64 build: success

          ## Source Snapshot

          - \`os-next-stage-files.tar.gz\` - tracked project files from commit \`${{ github.sha }}\`

          ## Branch

          - \`${{ github.ref_name }}\`
          EOF

      - name: Create or update draft release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ci-draft
          target_commitish: ${{ github.sha }}
          name: os-next-stage CI Draft
          body_path: release_notes.md
          draft: true
          prerelease: true
          files: |
            os-next-stage-files.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
