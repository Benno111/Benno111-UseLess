name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:

  Build:
    name: Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up release build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            dosfstools \
            fdisk \
            mtools \
            qemu-system-x86 \
            qemu-system-arm \
            qemu-system-aarch64 \
            qemu-efi-aarch64 \
            qemu-utils \
            xorriso \
            make \
            lld \
            llvm \
            nasm

      - name: Build x86_64 ISO
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          BUILD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          export BUILD_COMPILE_TIME="$(date -u +'%Y-%m-%d %H:%M:%SZ')"
          make -f Makefile.multiarch ARCH=x86_64 image

      - name: Build x86_64 Installer ISO
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          BUILD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          export BUILD_COMPILE_TIME="$(date -u +'%Y-%m-%d %H:%M:%SZ')"
          make -f Makefile.multiarch ARCH=x86_64 installer-image

      - name: Verify release files
        run: |
          set -euxo pipefail
          ls -lh image/os8-x86_64.iso*
          file image/os8-x86_64.iso
          if [ -f image/os8-x86_64.iso.xz ]; then
            file image/os8-x86_64.iso.xz
          fi
          ls -lh image/os8-x86_64-installer.iso image/os8-x86_64-system.img
          file image/os8-x86_64-installer.iso
          file image/os8-x86_64-system.img
          if [ -f image/os8-x86_64-installer.iso.xz ]; then
            file image/os8-x86_64-installer.iso.xz
          fi

      - name: Generate release notes
        run: |
          cat > release_notes.md << EOF
          # os CI Draft

          Automatic draft release generated from CI.

          ## Build Status

          - ARM64 ISO: skipped for now
          - x86_64 ISO: success
          - x86_64 Installer ISO: success

          ## Bootable Media

          - \`os8-x86_64.iso\`
          - \`os8-x86_64.iso.xz\`
          - \`os8-x86_64-installer.iso\`

          ## Branch
          - \`${{ github.ref_name }}\`

          ## Commit
          - \`${{ github.sha }}\`
          EOF

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-draft
          target_commitish: ${{ github.sha }}
          name: os CI Draft
          body_path: release_notes.md
          draft: False ##Auto-draft is not working, so we set it to false and update the release with the files
          prerelease: False ## Set to true if you want to mark this release as a prerelease
          files: |
            image/os8-x86_64.iso
            image/os8-x86_64.iso.xz
            image/os8-x86_64-installer.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
