name: Apply Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create branch
        run: |
          git checkout -B auto/apply-patch

      - name: Apply patch
        run: |
          git apply --reject --whitespace=fix fixes/core-system-fixes.patch

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply patch" || echo "No changes to commit"

      - name: Push
        run: |
          git push origin auto/apply-patch --force
