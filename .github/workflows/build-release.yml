name: Build and Release os-next-stage

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v8.0.0)'
        required: true
        default: 'v8.0.0'

jobs:
  create-release:
    name: Build and Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            dosfstools \
            mtools \
            qemu-system-arm \
            qemu-system-x86 \
            make \
            lld \
            llvm \
            xorriso

      - name: Build ARM64 kernel
        run: |
          make kernel

      - name: Create ARM64 bootable image
        run: |
          make image || echo "Image creation skipped (optional)"

      - name: Package ARM64 release bundle
        run: |
          mkdir -p release/arm64
          cp build/arm64/kernel/os-arm64.elf release/arm64/os-arm64.elf
          if [ -f image/os-arm64.img ]; then
            cp image/os-arm64.img release/arm64/os-arm64.img
          fi
          cp boot/grub/grub.cfg release/arm64/grub.cfg
          cp BUILD_LINUX.md release/arm64/BUILD_LINUX.md
          cat > release/arm64/BOOTING.md << 'EOF'
          ARM64 boot files included in this bundle:
          - os-arm64.elf: kernel binary
          - os-arm64.img: bootable disk image, if present
          - grub.cfg: boot menu configuration used by the project

          Recommended boot path:
          1. Prefer os-arm64.img for QEMU, UTM, or raw flashing to media.
          2. If you are debugging the kernel manually, use os-arm64.elf together with the included config as reference.
          EOF

          cd release/arm64
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          cd ../..

          tar -czf os-arm64.tar.gz -C release/arm64 .

      - name: Build x86 kernel
        run: |
          make -f Makefile.multiarch ARCH=x86 kernel

      - name: Package x86 release bundle
        run: |
          mkdir -p release/x86
          cp build/x86/kernel/os-x86.elf release/x86/os-x86.elf
          cat > release/x86/BOOTING.md << 'EOF'
          x86 boot files included in this bundle:
          - os-x86.elf: x86 kernel binary

          Recommended boot path:
          1. Use this kernel binary for emulator or bootloader integration work.
          2. If you later add BIOS boot media generation for x86 release builds, include that image alongside this kernel.
          EOF

          cd release/x86
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          cd ../..

          tar -czf os-x86.tar.gz -C release/x86 .

      - name: Build x86_64 ISO
        run: |
          make -f Makefile.multiarch ARCH=x86_64 image

      - name: Build x86_64 Installer ISO
        run: |
          make -f Makefile.multiarch ARCH=x86_64 installer-image

      - name: Verify x86_64 ISO boot contents
        run: |
          ISO=image/os8-x86_64.iso
          xorriso -indev "$ISO" -find /boot/main.sys -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /boot/limine-bios-cd.bin -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /boot/limine-uefi-cd.bin -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /boot/limine-bios.sys -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /EFI/BOOT/BOOTX64.EFI -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /limine.conf -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /boot/limine.conf -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /EFI/BOOT/limine.conf -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find / -type f -exec lsdl >/tmp/x86_64-iso-files.txt
          cat /tmp/x86_64-iso-files.txt

      - name: Verify x86_64 Installer ISO boot contents
        run: |
          ISO=image/os8-x86_64-installer.iso
          xorriso -indev "$ISO" -find /boot/main.sys -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /boot/limine-bios-cd.bin -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /boot/limine-uefi-cd.bin -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /boot/limine-bios.sys -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find /INSTALLERS.TXT -quit >/dev/null 2>&1
          xorriso -indev "$ISO" -find / -type f -exec lsdl >/tmp/x86_64-installer-iso-files.txt
          cat /tmp/x86_64-installer-iso-files.txt

      - name: Package x86_64 release bundle
        run: |
          mkdir -p release/x86_64/boot-support
          cp build/x86_64/kernel/os-x86_64.elf release/x86_64/os-x86_64.elf
          cp image/os8-x86_64.iso release/x86_64/os8-x86_64.iso
          cp image/os8-x86_64-installer.iso release/x86_64/os8-x86_64-installer.iso
          cp /tmp/x86_64-iso-files.txt release/x86_64/ISO_CONTENTS.txt
          cp /tmp/x86_64-installer-iso-files.txt release/x86_64/INSTALLER_ISO_CONTENTS.txt
          cp os-x86_64/limine.conf release/x86_64/limine.conf
          cp os-x86_64/limine/bin/BOOTX64.EFI release/x86_64/boot-support/BOOTX64.EFI
          cp os-x86_64/limine/bin/limine-bios.sys release/x86_64/boot-support/limine-bios.sys
          cp os-x86_64/limine/bin/limine-bios-cd.bin release/x86_64/boot-support/limine-bios-cd.bin
          cp os-x86_64/limine/bin/limine-uefi-cd.bin release/x86_64/boot-support/limine-uefi-cd.bin
          cat > release/x86_64/BOOTING.md << 'EOF'
          x86_64 boot files included in this bundle:
          - os8-x86_64.iso: hybrid BIOS+UEFI ISO for VMs, Rufus, or direct USB writing
          - os8-x86_64-installer.iso: installer ISO with the graphical installer environment
          - os-x86_64.elf: kernel binary
          - ISO_CONTENTS.txt: manifest of files verified inside the ISO
          - INSTALLER_ISO_CONTENTS.txt: manifest of files verified inside the installer ISO
          - limine.conf: Limine boot menu configuration
          - boot-support/: Limine BIOS and UEFI boot files used to build the ISO

          Recommended boot path:
          1. Use os8-x86_64.iso directly in a VM.
          2. Use os8-x86_64-installer.iso when you need the installer environment.
          3. Use Rufus in ISO mode to write any of the ISO images to USB.
          4. Use the boot-support files only if you are rebuilding or debugging the boot media layout.
          EOF

          cd release/x86_64
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          cd ../..

          tar -czf os-x86_64.tar.gz -C release/x86_64 .

      - name: Package full OS files
        run: |
          git ls-files -z \
            | tar --null -czf os-next-stage-files.tar.gz --files-from=-

      - name: Extract version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        run: |
          cat > release_notes.md << 'EOF'
          # os-next-stage ${{ steps.get_version.outputs.version }}

          os-next-stage operating system with ARM64 and x86_64 support and GUI.

          ## Supported Architectures

          - ARM64 - Raspberry Pi 4/5, ARM64 UEFI boards, Apple Silicon (via UTM)
          - x86_64 - UEFI-capable PCs and x86_64 virtual machines

          > Note: For a standalone x86_64 UEFI build, see the `os-next-stage-x86_64/` folder.

          ## Downloads

          ### ARM64
          - `os-arm64.tar.gz` - ARM64 kernel and boot bundle
            - `os-arm64.elf` - Kernel binary
            - `os-arm64.img` - Bootable SD card image (if available)
            - `grub.cfg` - Boot menu configuration
            - `BOOTING.md` - Boot instructions for the bundle
            - `SHA256SUMS` - Checksums for verification

          ### x86_64
          - `os-x86_64.tar.gz` - x86_64 BIOS+UEFI bundle
            - `os-x86_64.elf` - Kernel binary
            - `os8-x86_64.iso` - Hybrid ISO for VMs, Rufus, and direct USB writing
            - `ISO_CONTENTS.txt` - Verified manifest of boot files inside the ISO
            - `limine.conf` - Boot menu configuration
            - `boot-support/` - Limine BIOS and UEFI boot files used by the ISO
            - `BOOTING.md` - Boot instructions for the bundle
            - `SHA256SUMS` - Checksums for verification

          ### x86
          - `os-x86.tar.gz` - x86 kernel bundle
            - `os-x86.elf` - 32-bit x86 kernel binary
            - `BOOTING.md` - Boot instructions for the bundle
            - `SHA256SUMS` - Checksums for verification

          ### Full OS Files
          - `os-next-stage-files.tar.gz` - Full project files snapshot for the OS source tree
            - Kernel, drivers, libc, runtimes, userspace, boot files, scripts, and documentation

          ## Quick Start

          ### For ARM64 (Raspberry Pi 4/5)
          ```bash
          tar -xzf os-arm64.tar.gz
          sudo dd if=os-arm64.img of=/dev/sdX bs=4M status=progress
          sync
          ```

          ### For Apple Silicon (UTM)
          1. Download UTM from https://mac.getutm.app/
          2. Create new ARM64 virtual machine
          3. Use `os-arm64.img` as boot disk
          4. Configure 2GB+ RAM and boot

          ## Features

          - Full graphical desktop environment
          - Process scheduling and multi-threading
          - Virtual File System (VFS) with RAMFS, EXT4 support
          - TCP/IP networking stack
          - Python and Nano scripting languages
          - Doom, Snake, and other apps
          - Media support (JPEG, MP3)

          ## Documentation

          See the repository for detailed documentation:
          - `README.md` - Full feature overview
          - `BUILD_LINUX.md` - Build instructions

          ## Verification

          Verify your downloads using SHA256:
          ```bash
          sha256sum -c SHA256SUMS
          ```

          ## Disclaimer

          This is experimental software. Use at your own risk. Always back up your data before installing on real hardware.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: os-next-stage ${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          draft: true
          prerelease: false
          files: |
            os-arm64.tar.gz
            os-x86_64.tar.gz
            os-x86.tar.gz
            os-next-stage-files.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
