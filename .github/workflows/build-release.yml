name: Build and Release os-next-stage

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.5.0)'
        required: true
        default: 'v0.5.0'

jobs:
  create-release:
    name: Build and Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-system-arm \
            qemu-system-x86 \
            make \
            lld \
            llvm \
            xorriso

      - name: Build ARM64 kernel
        run: |
          make clean
          make kernel

      - name: Create ARM64 bootable image
        run: |
          make image || echo "Image creation skipped (optional)"

      - name: Package ARM64 release bundle
        run: |
          mkdir -p release/arm64
          cp build/kernel/unixos.elf release/arm64/vibos-arm64.elf
          if [ -f image/unixos.img ]; then
            cp image/unixos.img release/arm64/vibos-arm64.img
          fi

          cd release/arm64
          sha256sum * > SHA256SUMS
          cd ../..

          tar -czf vibos-arm64.tar.gz -C release/arm64 .

      - name: Build x86_64 ISO
        run: |
          make -f Makefile.multiarch ARCH=x86_64 clean
          make -f Makefile.multiarch ARCH=x86_64 image

      - name: Package x86_64 release bundle
        run: |
          mkdir -p release/x86_64
          cp build/x86_64/kernel/vibos-x86_64.elf release/x86_64/vibos-x86_64.elf
          cp image/vibos-x86_64.iso release/x86_64/vibos-x86_64.iso

          cd release/x86_64
          sha256sum * > SHA256SUMS
          cd ../..

          tar -czf vibos-x86_64.tar.gz -C release/x86_64 .

      - name: Extract version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        run: |
          cat > release_notes.md << 'EOF'
          # os-next-stage ${{ steps.get_version.outputs.version }}

          os-next-stage operating system with ARM64 and x86_64 support and GUI.

          ## Supported Architectures

          - ARM64 - Raspberry Pi 4/5, ARM64 UEFI boards, Apple Silicon (via UTM)
          - x86_64 - UEFI-capable PCs and x86_64 virtual machines

          > Note: For a standalone x86_64 UEFI build, see the `os-next-stage-x86_64/` folder.

          ## Downloads

          ### ARM64
          - `vibos-arm64.tar.gz` - ARM64 kernel and bootable image
            - `vibos-arm64.elf` - Kernel binary
            - `vibos-arm64.img` - Bootable SD card image (if available)
            - `SHA256SUMS` - Checksums for verification

          ### x86_64
          - `vibos-x86_64.tar.gz` - x86_64 BIOS+UEFI bundle
            - `vibos-x86_64.elf` - Kernel binary
            - `vibos-x86_64.iso` - Hybrid ISO for VMs, Rufus, and direct USB writing
            - `SHA256SUMS` - Checksums for verification

          ## Quick Start

          ### For ARM64 (Raspberry Pi 4/5)
          ```bash
          tar -xzf vibos-arm64.tar.gz
          sudo dd if=vibos-arm64.img of=/dev/sdX bs=4M status=progress
          sync
          ```

          ### For Apple Silicon (UTM)
          1. Download UTM from https://mac.getutm.app/
          2. Create new ARM64 virtual machine
          3. Use `vibos-arm64.img` as boot disk
          4. Configure 2GB+ RAM and boot

          ## Features

          - Full graphical desktop environment
          - Process scheduling and multi-threading
          - Virtual File System (VFS) with RAMFS, EXT4 support
          - TCP/IP networking stack
          - Python and Nano scripting languages
          - Doom, Snake, and other apps
          - Media support (JPEG, MP3)

          ## Documentation

          See the repository for detailed documentation:
          - `README.md` - Full feature overview
          - `BUILD_LINUX.md` - Build instructions

          ## Verification

          Verify your downloads using SHA256:
          ```bash
          sha256sum -c SHA256SUMS
          ```

          ## Disclaimer

          This is experimental software. Use at your own risk. Always back up your data before installing on real hardware.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: os-next-stage ${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          draft: true
          prerelease: false
          files: |
            vibos-arm64.tar.gz
            vibos-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
