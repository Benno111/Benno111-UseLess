# OS next stage GRUB Configuration
# For ARM64 UEFI boot

set default=0
set timeout=5
set gfxmode=auto

# Load video modules
insmod all_video
insmod gfxterm

# Set terminal output
terminal_output gfxterm

# OS next stage boot menu entry
menuentry "OS next stage" {
    echo "Loading OS next stage kernel..."
    
    # Load kernel with multiboot2
    # For ARM64, we use linux command with EFI stub
    linux /EFI/BOOT/main.sys root=/dev/nvme0n1p2 console=ttyS0,115200 console=tty0
    
    # Load initial ramdisk if present
    # initrd /EFI/BOOT/initrd.img
    
    echo "Booting..."
}

menuentry "OS next stage (Safe Mode)" {
    echo "Loading OS next stage in safe mode..."
    
    linux /EFI/BOOT/main.sys root=/dev/nvme0n1p2 console=ttyS0,115200 single nosmp
    
    echo "Booting..."
}

menuentry "OS next stage (Debug Mode)" {
    echo "Loading OS next stage with debugging..."
    
    linux /EFI/BOOT/main.sys root=/dev/nvme0n1p2 console=ttyS0,115200 debug earlyprintk=serial
    
    echo "Booting..."
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
